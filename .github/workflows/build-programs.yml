name: Build Programs

on:
  workflow_call:
    inputs:
      git_ref:
        type: string

env:
  CACHE: true

jobs:
  build_programs:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Load environment variables
        id: env_vars
        run: |
          cat .github/.env >> "$GITHUB_ENV"
          while IFS='=' read -r key value; do
            case "$key" in
              RUST_VERSION) printf 'rust_version=%s\n' "$value" >> "$GITHUB_OUTPUT" ;;
              SOLANA_VERSION) printf 'solana_version=%s\n' "$value" >> "$GITHUB_OUTPUT" ;;
            esac
          done < .github/.env

      - name: Install Rust
        uses: metaplex-foundation/actions/install-rust@v1
        with:
          toolchain: ${{ steps.env_vars.outputs.rust_version }}

      - name: Install Solana
        uses: metaplex-foundation/actions/install-solana@v1
        with:
          version: ${{ steps.env_vars.outputs.solana_version }}
          cache: ${{ env.CACHE }}

      - name: Cache program dependencies
        if: env.CACHE == 'true'
        uses: metaplex-foundation/actions/cache-programs@v1

      - name: Install libudev (required by solana-verify)
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Solana Verify
        run: cargo install solana-verify --locked --force --version "${SOLANA_VERIFY_VERSION}"

      - name: Build programs
        shell: bash
        working-directory: configs/scripts/program
        run: ./build.sh
        env:
          PROGRAMS: ${{ env.PROGRAMS }}
      - name: Sanitize Ref
        id: sanitize
        shell: bash
        run: |
          REF="${{ inputs.git_ref }}"
          if [ -z "$REF" ]; then
            REF="default"
          fi
          SANITIZED=${REF//\//-}
          echo "sanitized=$SANITIZED" >> "$GITHUB_OUTPUT"
      - name: Upload program builds
        uses: actions/upload-artifact@v4
        with:
          name: program-builds-${{ steps.sanitize.outputs.sanitized }}
          # First wildcard ensures exported paths are consistently under the programs folder.
          path: ./program*/.bin/*.so
          include-hidden-files: true
          if-no-files-found: error
