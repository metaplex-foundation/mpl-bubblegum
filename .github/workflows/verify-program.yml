name: Verify Program

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Release tag, commit hash, or branch that was deployed
        required: true
        type: string
      program:
        description: Program
        required: true
        default: bubblegum
        type: choice
        options:
          - bubblegum
      cluster:
        description: Cluster environment
        required: true
        default: mainnet-beta
        type: choice
        options:
          - mainnet-beta
      submit_remote_job:
        description: Submit the remote verification job after the exported PDA transaction has been executed through Squads
        required: false
        type: boolean
        default: false

env:
  CACHE: true

jobs:
  verify_program:
    name: Program / Verify
    runs-on: ubuntu-latest-16-cores
    permissions:
      contents: read
    steps:
      - name: Git checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Load environment variables
        id: env_vars
        run: |
          grep -E '^(RUST_VERSION|DEPLOY_SOLANA_VERSION|SOLANA_VERIFY_RUST_VERSION|SOLANA_VERIFY_VERSION|SOLANA_VERIFY_BASE_IMAGE)=' .github/.env >> "$GITHUB_ENV"
          while IFS='=' read -r key value; do
            case "$key" in
              RUST_VERSION) printf 'rust_version=%s\n' "$value" >> "$GITHUB_OUTPUT" ;;
              DEPLOY_SOLANA_VERSION) printf 'deploy_solana_version=%s\n' "$value" >> "$GITHUB_OUTPUT" ;;
            esac
          done < .github/.env

      - name: Install Linux build deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: metaplex-foundation/actions/install-rust@v1
        with:
          toolchain: ${{ steps.env_vars.outputs.rust_version }}

      - name: Install Solana
        uses: metaplex-foundation/actions/install-solana@v1
        with:
          version: ${{ steps.env_vars.outputs.deploy_solana_version }}
          cache: ${{ env.CACHE }}

      - name: Install Solana Verify
        run: |
          rustup toolchain install "${SOLANA_VERIFY_RUST_VERSION}" --profile minimal
          cargo "+${SOLANA_VERIFY_RUST_VERSION}" install solana-verify --locked --force --version "${SOLANA_VERIFY_VERSION}"

      - name: Set RPC
        run: |
          if [ "${{ inputs.cluster }}" == "mainnet-beta" ]; then
            printf 'RPC=%s\n' "${{ secrets.MAINNET_RPC }}" >> "$GITHUB_ENV"
            printf 'PROGRAM_ID=%s\n' "BGUMAp9Gq7iTEuizy4pqaxsTyUCBK68MDfK752saRPUY" >> "$GITHUB_ENV"
            printf 'SQUADS_VAULT=%s\n' "bfQVv6niKVgEURYqQ1beJmiEQQN7MrvLRvk3mZGFubb" >> "$GITHUB_ENV"
          else
            echo "Invalid cluster: ${{ inputs.cluster }}"
            exit 1
          fi

      - name: Export verified-build PDA transaction
        if: github.event.inputs.submit_remote_job != 'true'
        run: |
          COMMIT_HASH="$(git rev-parse HEAD)"

          solana-verify export-pda-tx \
            --url "${RPC}" \
            --program-id "${PROGRAM_ID}" \
            --uploader "${SQUADS_VAULT}" \
            --encoding base58 \
            --compute-unit-price 0 \
            --base-image "${SOLANA_VERIFY_BASE_IMAGE}" \
            --library-name bubblegum \
            --mount-path programs/bubblegum \
            --commit-hash "${COMMIT_HASH}" \
            https://github.com/metaplex-foundation/mpl-bubblegum.git \
            -- \
            --package bubblegum

      - name: Submit remote verification job
        if: github.event.inputs.submit_remote_job == 'true'
        run: |
          solana-verify remote submit-job \
            --url "${RPC}" \
            --program-id "${PROGRAM_ID}" \
            --uploader "${SQUADS_VAULT}"
